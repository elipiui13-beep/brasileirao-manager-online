function autoCode(name){
  const cleaned=name.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9 ]/g,' ');
  const words=cleaned.split(/\s+/).filter(Boolean).filter(w=>!['de','do','da','dos','das','club','clube','fc','ec','sc'].includes(w.toLowerCase()));
  if(words.length===0)return cleaned.slice(0,3).toUpperCase();
  if(words.length===1)return words[0].slice(0,3).toUpperCase();
  return words.slice(0,4).map(w=>w[0]).join('').toUpperCase();

ll" onclick="listPlayer('${p.id}')">${p.listed?"Retirar":"Vender"}</button></span></div>`).join("")}</div>`}
function toggleInjuryDecision(id){let t=team(manager().team),p=t.players.find(x=>x.id===id);if(!p||!p.injury)return;p.playInjured=!p.playInjured;if(!p.playInjured&&p.starter)p.starter=false;save();squad()}

function setTactic(v){let t=team(manager().team);t.tactic=v;save();squad()}
function autoLineup(redraw=true){let t=team(manager().team),need={...(FORMATIONS[t.formation]||FORMATIONS["4-3-3"])};t.players.forEach(p=>p.starter=false);let chosen=[];Object.entries(need).forEach(([pos,n])=>{let pool=t.players.filter(p=>availableForMatch(p)&&p.pos===pos&&!chosen.includes(p)).sort((a,b)=>effectiveRating(b)-effectiveRating(a));chosen.push(...pool.slice(0,n))});let remaining=t.players.filter(p=>availableForMatch(p)&&!chosen.includes(p)).sort((a,b)=>effectiveRating(b)-effectiveRating(a));chosen.push(...remaining.slice(0,11-chosen.length));chosen.slice(0,11).forEach(p=>p.starter=true);save();squad()}
function toggle(id){let t=team(manager().team),p=t.players.find(x=>x.id===id);if(!p.starter&&p.injury&&p.injury.gamesLeft>0&&!p.playInjured)return alert("O jogador está lesionado. Escolha ‘Forçar jogo’ antes de escalá-lo.");if(!p.starter&&t.players.filter(x=>x.starter).length>=11)return alert("Já há 11 titulares.");p.starter=!p.starter;save();squad()}

function filteredNational(){let q=($("nqPlayer")?.value||"").toLowerCase(),div=$("nqDivision")?.value||"",pos=$("nqPos")?.value||"",val=+($("nqValue")?.value||0)*1e6,rat=+($("nqRating")?.value||0);return marketPlayers().filter(x=>(!q||(x.p.name+" "+x.owner.name).toLowerCase().includes(q))&&(!div||x.owner.division===div)&&(!pos||x.p.pos===pos)&&(!val||x.p.value<=val)&&(!rat||x.p.rating>=rat)).sort((a,b)=>b.p.rating-a.p.rating||a.p.value-b.p.value)}

function buyForeign(pid){
 let buyer=team(manager().team),p=S.globalMarket.find(x=>x.id===pid);if(!p||p.bought)return;
 if(buyer.cash<p.value)return alert("Caixa insuficiente.");
 buyer.cash-=p.value;p.bought=true;
 buyer.players.push({id:"F-"+p.id+"-"+Date.now(),name:p.name,pos:p.pos,rating:p.rating,age:p.age,value:p.value,starter:false,goals:0,yellow:0,red:0,injured:0,listed:false,originClub:p.club,originLeague:p.league});
 S.news.unshift(`${buyer.name} contratou ${p.name}, do ${p.club}, por ${fmt(p.value)}.`);
 save();drawGlobalMarket();header();
}
function aiSaleDecision(seller,p){let depth=seller.players.filter(x=>x.pos===p.pos).length,starter=p.starter,listed=p.listed,young=p.age<=23,star=p.rating>=seller.base+3;let willingness=(listed?55:0)+(depth>=3?18:0)+(!starter?18:0)+(p.age>=31?10:0)-(young?12:0)-(star?25:0);let mult=listed?1.02:starter?1.28:1.14;if(star)mult+=.18;if(young)mult+=.10;return {willingness,asking:Math.round(p.value*mult/50000)*50000}}
function buy(pid,oid){let buyer=team(manager().team),seller=team(oid),p=seller.players.find(x=>x.id===pid);if(!p)return;let d=aiSaleDecision(seller,p);if(seller.players.length<=16)return alert(`${seller.name} não vende: elenco curto.`);if(d.willingness+Math.random()*45<35)return alert(`${seller.name} recusou negociar ${p.name}. Ele é importante para o elenco.`);if(buyer.cash<d.asking)return alert(`O ${seller.name} aceita conversar, mas pede ${fmt(d.asking)}. Seu caixa é insuficiente.`);buyer.cash-=d.asking;seller.cash+=d.asking;seller.players=seller.players.filter(x=>x.id!==pid);p.listed=false;p.starter=false;buyer.players.push(p);S.news.unshift(`${buyer.name} comprou ${p.name}, do ${seller.name}, por ${fmt(d.asking)}.`);save();market()}
function sellNow(pid){let t=team(manager().team),p=t.players.find(x=>x.id===pid);if(t.players.length<=15)return alert("O elenco precisa manter pelo menos 15 jogadores.");let offer=Math.round(p.value*(.82+Math.random()*.25));t.cash+=offer;t.players=t.players.filter(x=>x.id!==pid);S.news.unshift(`${t.name} vendeu ${p.name} por ${fmt(offer)}.`);save();market()}
function stadiumUpgradeCost(t){return Math.round((8+t.stadium.level*7)*1e6)}
function upgradeStadium(){let t=team(manager().team),cost=stadiumUpgradeCost(t);if(t.stadium.level>=10)return alert("O estádio já está no nível máximo.");if(t.cash<cost)return alert("Caixa insuficiente para esta melhoria.");t.cash-=cost;t.stadium.level++;t.stadium.capacity+=5000+2000*t.stadium.level;S.news.unshift(`${t.name} ampliou seu estádio para ${t.stadium.capacity.toLocaleString("pt-BR")} lugares.`);save();home()}
function stadiumIncome(t,g){if(g.home!==t.id)return 0;let performance=.45+Math.min(.45,(pos(t)<=4?.25:pos(t)<=10?.12:0))+(Math.random()*.18);let attendance=Math.min(t.stadium.capacity,Math.round(t.stadium.capacity*performance));let ticket=28+t.stadium.level*4+(t.division==="A"?18:t.division==="B"?8:0);let gross=Math.round(attendance*ticket);let expenses=Math.round(gross*.22);let net=gross-expenses;t.stadium.lastAttendance=attendance;t.stadium.lastRevenue=net;t.stadium.totalRevenue+=net;t.cash+=net;return net}

function attacker(t){let a=t.players.filter(p=>p.starter&&availableForMatch(p)&&["ATA","PE","PD","MEI"].includes(p.pos));return a[rand(0,a.length-1)]||t.players.filter(availableForMatch)[0]}
const INJURIES=[{type:"Contusão leve",games:[1,1],risk:.10,penalty:2},{type:"Desconforto muscular",games:[1,2],risk:.18,penalty:3},{type:"Entorse no tornozelo",games:[2,4],risk:.28,penalty:5},{type:"Lesão muscular",games:[3,6],risk:.35,penalty:6},{type:"Lesão no joelho",games:[5,10],risk:.45,penalty:8}];
function createInjury(p){let x=INJURIES[rand(0,INJURIES.length-1)];p.injury={type:x.type,gamesLeft:rand(x.games[0],x.games[1]),risk:x.risk,penalty:x.penalty};p.injured=p.injury.gamesLeft;p.playInjured=false}
function eventPush(g,min,type,teamId,text){live.events.unshift({min,type,teamId,division:g.division,text})}
function randomStarter(t,filter=null){let pool=t.players.filter(p=>p.starter&&availableForMatch(p)&&(!filter||filter(p)));return pool.length?pool[rand(0,pool.length-1)]:null}
function goalkeeper(t){return randomStarter(t,p=>p.pos==="GOL")||t.players.find(p=>p.pos==="GOL")}
function scoreGoal(g,t,isHome,min,label="gol"){if(isHome)g.hg++;else g.ag++;let p=attacker(t);if(p){p.goals++;eventPush(g,min,label==="penalty"?"penalty":"goal",t.id,label==="penalty"?`⚽ PÊNALTI! ${p.name} converte para o ${t.name}.`:`⚽ GOL do ${t.name}! ${p.name} balança a rede.`)}}
function tick(g,min){
 let h=team(g.home),a=team(g.away),dif=strength(h)-strength(a),ht=TACTICS[h.tactic]||TACTICS["Equilibrada"],at=TACTICS[a.tactic]||TACTICS["Equilibrada"];
 let hp=Math.max(.002,(.0108+dif*.0003)*ht.atk/at.def),ap=Math.max(.002,(.009-dif*.0003)*at.atk/ht.def),r=Math.random();
 if(r<hp)scoreGoal(g,h,true,min);else if(r<hp+ap)scoreGoal(g,a,false,min);
 let x=Math.random();

function updateFitnessAfterMatch(t){t.players.forEach(p=>p.matchSentOff=false);let tactic=TACTICS[t.tactic]||TACTICS["Equilibrada"];t.players.forEach(p=>{let played=p.starter&&availableForMatch(p);if(played){let loss=rand(7,12)+(t.tactic==="Pressão alta"?3:t.tactic==="Ofensiva"?1:0);p.fitness=Math.max(45,p.fitness-loss)}else{let gain=p.injury&&p.injury.gamesLeft>0?rand(3,6):rand(8,13);p.fitness=Math.min(100,p.fitness+gain)}p.lastPower=effectiveRating(p)})}

}

// ===== V15.4: ASSISTÊNCIAS CORRIGIDAS =====
function chooseAssistProvider(t,scorer){
  const active=t.players.filter(p=>p.id!==scorer?.id&&p.starter&&!p.matchSentOff&&!p.matchInjuredOut&&availableForMatch(p));
  if(!active.length||Math.random()<0.18)return null;
  const weighted=[];
  active.forEach(p=>{
    let weight=1;
    if(['MEI','MC','PE','PD'].includes(p.pos))weight=5;
    else if(['ATA','VOL','LE','LD'].includes(p.pos))weight=2;
    for(let i=0;i<weight;i++)weighted.push(p);
  });
  return weighted[rand(0,weighted.length-1)]||null;
}
function scoreGoal(g,t,isHome,min,label="gol"){
  if(isHome)g.hg++;else g.ag++;
  const scorer=attacker(t);
  if(!scorer)return;
  scorer.goals=(scorer.goals||0)+1;
  scorer.matchGoals=(scorer.matchGoals||0)+1;
  let assister=null;
  if(label!=="penalty"){
    assister=chooseAssistProvider(t,scorer);
    if(assister){
      assister.assists=(assister.assists||0)+1;
      assister.matchAssists=(assister.matchAssists||0)+1;
    }
  }
  const text=label==="penalty"
    ?`⚽ PÊNALTI! ${scorer.name} converte para o ${t.name}.`
    :`⚽ GOL do ${t.name}! ${scorer.name} balança a rede${assister?` após assistência de ${assister.name}`:''}.`;
  eventPush(g,min,label==="penalty"?"penalty":"goal",t.id,text);
}



// V15.5: seletor mostra somente jogadores da posição exigida
function fieldLineup(t){
  const layout=FIELD_LAYOUTS[t.formation]||FIELD_LAYOUTS['4-3-3'];
  if(!t.lineupSlots||t.lineupSlots.length!==11)syncSlotsFromStarters(t);
  const used=new Set();
  t.lineupSlots.forEach((slot,i)=>{
    const role=layout[i][0];
    const current=t.players.find(p=>p.id===slot.playerId);
    const currentPos=current?(current.naturalPos||current.pos):null;
    if(!current||currentPos!==role||used.has(current.id)||!availableForMatch(current))slot.playerId=null;
    else used.add(current.id);
  });
  t.lineupSlots.forEach((slot,i)=>{
    if(slot.playerId)return;
    const role=layout[i][0];
    const candidate=t.players
      .filter(p=>availableForMatch(p)&&!used.has(p.id)&&(p.naturalPos||p.pos)===role)
      .sort((a,b)=>effectiveRating(b)-effectiveRating(a))[0];
    if(candidate){slot.playerId=candidate.id;used.add(candidate.id)}
  });
  t.players.forEach(p=>p.starter=t.lineupSlots.some(s=>s.playerId===p.id));
  return `<div class="field"><div class="goal-mouth top"></div><div class="goal-mouth bottom"></div><div class="goal-box top"></div><div class="goal-box bottom"></div><div class="six-box top"></div><div class="six-box bottom"></div><div class="center-circle"></div><div class="center-dot"></div><div class="penalty-dot top"></div><div class="penalty-dot bottom"></div><div class="penalty-arc top"></div><div class="penalty-arc bottom"></div><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>${layout.map((s,i)=>{const role=s[0],current=t.lineupSlots[i]?.playerId||'',opts=t.players.filter(p=>availableForMatch(p)&&(p.naturalPos||p.pos)===role).sort((a,b)=>effectiveRating(b)-effectiveRating(a));return `<div class="slot ${role==='GOL'?'gk':''}" style="left:${s[1]}%;top:${s[2]}%"><div class="slot-label">${role}</div><select onchange="assignSlot(${i},this.value)"><option value="">Selecione ${role}</option>${opts.map(p=>`<option value="${p.id}" ${p.id===current?'selected':''}>${p.name} — ${p.naturalPos||p.pos} (${effectiveRating(p).toFixed(1)})</option>`).join('')}</select></div>`}).join('')}</div>`;
}

function fieldLineup(t){
  const layout=FIELD_LAYOUTS[t.formation]||FIELD_LAYOUTS['4-3-3'];
  if(!t.lineupSlots||t.lineupSlots.length!==11)syncSlotsFromStarters(t);
  const used=new Set();
  // Mantém escolhas válidas, inclusive improvisados; remove apenas indisponíveis ou duplicados.
  t.lineupSlots.forEach(slot=>{
    const p=t.players.find(x=>x.id===slot.playerId);
    if(!p||!availableForMatch(p)||used.has(p.id))slot.playerId=null;
    else used.add(p.id);
  });
  // Preenchimento automático: natural primeiro; quando não houver, improvisa o melhor disponível.
  t.lineupSlots.forEach((slot,i)=>{
    if(slot.playerId)return;
    const role=layout[i][0];
    const available=t.players.filter(p=>availableForMatch(p)&&!used.has(p.id));
    const naturals=available.filter(p=>(p.naturalPos||p.pos)===role);
    const candidate=(naturals.length?naturals:available).sort((a,b)=>effectiveRating(b)-effectiveRating(a))[0];
    if(candidate){slot.playerId=candidate.id;used.add(candidate.id)}
  });
  t.players.forEach(p=>p.starter=t.lineupSlots.some(s=>s.playerId===p.id));
  const markings='<div class="goal-mouth top"></div><div class="goal-mouth bottom"></div><div class="goal-box top"></div><div class="goal-box bottom"></div><div class="six-box top"></div><div class="six-box bottom"></div><div class="center-circle"></div><div class="center-dot"></div><div class="penalty-dot top"></div><div class="penalty-dot bottom"></div><div class="penalty-arc top"></div><div class="penalty-arc bottom"></div><div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>';
  return `<div class="field">${markings}${layout.map((s,i)=>{
    const role=s[0],current=t.lineupSlots[i]?.playerId||'';
    const all=t.players.filter(p=>availableForMatch(p));
    const naturals=all.filter(p=>(p.naturalPos||p.pos)===role);
    let opts=naturals.length?naturals:all;
    const currentPlayer=t.players.find(p=>p.id===current);
    if(currentPlayer&&availableForMatch(currentPlayer)&&!opts.some(p=>p.id===currentPlayer.id))opts=[currentPlayer,...opts];
    opts=[...new Map(opts.map(p=>[p.id,p])).values()].sort((a,b)=>effectiveRating(b)-effectiveRating(a));
    const emergency=naturals.length===0;
    return `<div class="slot ${role==='GOL'?'gk':''}" style="left:${s[1]}%;top:${s[2]}%"><div class="slot-label">${role}${emergency?' ⚠':''}</div><select onchange="assignSlot(${i},this.value)"><option value="">Selecione ${role}</option>${opts.map(p=>`<option value="${p.id}" ${p.id===current?'selected':''}>${p.name} — ${p.naturalPos||p.pos}${(p.naturalPos||p.pos)!==role?' (improvisado)':''} (${effectiveRating(p).toFixed(1)})</option>`).join('')}</select></div>`
  }).join('')}</div>`;
}

const GAME_AUDIO={ctx:null,master:null,ambient:null,ambientGain:null,muted:false,volume:.45,unlocked:false};
function ensureAudio(){

  if(!GAME_AUDIO.ctx){
   const Ctx=window.AudioContext||window.webkitAudioContext;
   if(!Ctx)return null;

   GAME_AUDIO.master=GAME_AUDIO.ctx.createGain();
   GAME_AUDIO.master.gain.value=GAME_AUDIO.muted?0:GAME_AUDIO.volume;
   GAME_AUDIO.master.connect(GAME_AUDIO.ctx.destination);
  }
  if(GAME_AUDIO.ctx.state==='suspended')GAME_AUDIO.ctx.resume();
  GAME_AUDIO.unlocked=true;return GAME_AUDIO.ctx;
 }catch(e){return null}
}

 g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(Math.max(.0002,gain),now+.012);g.gain.exponentialRampToValueAtTime(.0001,now+duration);
 o.connect(g);g.connect(GAME_AUDIO.master);o.start(now);o.stop(now+duration+.03);
}

 const len=Math.max(1,Math.floor(ctx.sampleRate*duration)),buf=ctx.createBuffer(1,len,ctx.sampleRate),data=buf.getChannelData(0);
 for(let i=0;i<len;i++)data[i]=(Math.random()*2-1)*(1-i/len);
 const src=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter(),now=ctx.currentTime+delay;
 src.buffer=buf;f.type='bandpass';f.frequency.value=900;f.Q.value=.7;g.gain.value=gain;src.connect(f);f.connect(g);g.connect(GAME_AUDIO.master);src.start(now);
}

 }

function divisionRank(d){return d==='A'?3:d==='B'?2:1}
function clubCareerScore(t){
  const standing=Math.max(1,pos(t)||20);
  const tableBonus=Math.max(0,21-standing)*1.3;
  const squad=(t.players||[]).slice().sort((a,b)=>effectiveRating(b)-effectiveRating(a)).slice(0,11);
  const squadPower=squad.length?squad.reduce((s,p)=>s+effectiveRating(p),0)/squad.length:0;
  const stadiumBonus=(t.stadium?.level||1)*2;
  return divisionRank(t.division)*100+tableBonus+squadPower+stadiumBonus;
}
function offerRequirement(t,cur){
  const upward=divisionRank(t.division)-divisionRank(cur.division);
  const base=t.division==='A'?55:t.division==='B'?28:8;
  const sameDivisionPremium=upward===0&&clubCareerScore(t)>clubCareerScore(cur)?5:0;
  return Math.min(95,base+sameDivisionPremium);
}
function offerSalaryFor(t,m){
  const base=t.division==='A'?12000000:t.division==='B'?5000000:2200000;
  const reputationBonus=1+Math.max(0,(m.reputation-20))/180;
  const clubBonus=1+Math.max(0,(clubCareerScore(t)-divisionRank(t.division)*100))/350;
  return Math.round(base*reputationBonus*clubBonus/50000)*50000;
}

function ensureFinanceV163(){
 if(!S)return;
 S.teams.forEach(t=>{
  if(!t.finance)t.finance={broadcast:0,sponsor:0,prizes:0,maintenance:0,interest:0,loans:0};
  if(!t.sponsor){

   t.sponsor={name:['VitalBet','Arena Mais','Banco Nacional','TurboNet','Max Sports'][t.id%5],seasonValue:base,goal:t.division==='A'?'G-8':t.division==='B'?'G-10':'G-12',bonus:Math.round(base*.25),paidSeason:0};
  }
  if(t.debt==null)t.debt=0;
  if(t.baseMaintenance==null)t.baseMaintenance=0;
 });
}
function divisionBroadcastPerRound(t){return t.division==='A'?1050000:t.division==='B'?420000:180000}
function fixedIncomeOld(t){return (t.division==='A'?2.2:t.division==='B'?.9:.4)*1e6}
function operatingCostPerRound(t){
 const stadium=(t.stadium?.capacity||15000)*(22+(t.stadium?.level||1)*2);
 const academy=(t.academy?.level||1)*(t.division==='A'?180000:t.division==='B'?100000:60000);
 const admin=t.division==='A'?380000:t.division==='B'?180000:90000;
 return Math.round((stadium/38)+academy+admin);
}
function applyRoundFinanceV163(){
 ensureFinanceV163();
 S.teams.forEach(t=>{
  // Retira a antiga receita fixa exagerada e substitui por direitos de transmissão menores.
  t.cash-=fixedIncomeOld(t);
  const media=divisionBroadcastPerRound(t);t.cash+=media;t.finance.broadcast+=media;
  const ops=operatingCostPerRound(t);t.cash-=ops;t.finance.maintenance+=ops;
  // Folha salarial mais realista sem alterar contratos existentes visualmente.
  const extraWage=Math.round(monthlyPayroll(t)/4*.35);t.cash-=extraWage;t.wageSpent=(t.wageSpent||0)+extraWage;
  // Juros das dívidas são processados anualmente pela expansão (8% ao ano).
  // Patrocínio em parcelas ao longo da temporada.
  const sponsorPart=Math.round(t.sponsor.seasonValue/38);t.cash+=sponsorPart;t.finance.sponsor+=sponsorPart;
 });
 // Clubes controlados pela IA recorrem a crédito somente quando o caixa fica negativo.
 const humanTeams=new Set((S.managers||[]).map(m=>m.team));
 S.teams.forEach(t=>{
  if(humanTeams.has(t.id)||t.cash>=0)return;
  const max=t.division==='A'?50000000:t.division==='B'?20000000:8000000;
  const reserve=t.division==='A'?1000000:t.division==='B'?500000:250000;
  const room=Math.max(0,max-(t.debt||0));
  const needed=Math.ceil((-t.cash+reserve)/100000)*100000;
  const amount=Math.min(room,needed);
  if(amount<=0)return;
  t.cash+=amount;t.debt=(t.debt||0)+amount;t.finance.loans=(t.finance.loans||0)+amount;
  S.news.unshift(`${t.name} contratou empréstimo emergencial de ${fmt(amount)} para equilibrar o caixa.`);
 });
 trimNewsHistory();
}

// ===== V16.8: abas das séries na tela Jogo durante e após a rodada =====
function completedRoundGames(d){
  if(!S||!S.schedules||!S.schedules[d])return [];
  const idx=Math.max(0,Math.min(S.schedules[d].length-1,(S.round||0)-1));
  return S.schedules[d][idx]||[];
}
function gameScoreRows(games,liveMode){
  const myId=manager().team;
  return games.map(g=>{
    const isMine=g.home===myId||g.away===myId;
    const score=(liveMode||g.played)?`${g.hg} × ${g.ag}`:'x';
    return `<div class="scoreline ${isMine?'human':''}"><div>${homeMark(g,g.home)}${teamDisplay(team(g.home))}</div><b>${score}</b><div>${teamDisplay(team(g.away))}</div></div>`;
  }).join('');
}
function gameplay(selectedDivision=null){
  const d=selectedDivision||gameplayDivision||team(manager().team)?.division||'A';
  gameplayDivision=d;
  const hasLive=!!live;
  const isActive=!!(live&&live.active);
  const games=hasLive?live.games.filter(g=>g.division===d):completedRoundGames(d);
  const events=hasLive?(live.events||[]).filter(e=>e.division===d):[];
  const roundLabel=hasLive?`Rodada ${Math.min(38,(S.round||0)+1)}`:(S.round>0?`Resultados da rodada ${S.round}`:'Próxima rodada');
  $('content').innerHTML=`
    <div class="card">
      <div id="clock" class="clock">${hasLive?(live.minute+"'"):'—'}</div>
      <div class="muted" style="text-align:center;margin-bottom:8px">${roundLabel}</div>
      <div class="controls" style="justify-content:center">
        ${isActive?`<button id="pause" class="btn" onclick="toggleLivePause()">${live.paused?'Continuar':'Pausar'}</button><button class="btn" onclick="changeLiveSpeed()">Velocidade ×<span id="speed">${live.speed}</span></button>`:`<button class="btn primary" onclick="startLive()">${S.round>0?'Iniciar próxima rodada':'Iniciar rodada'}</button>`}
      </div>
    </div>
    ${seriesTabs('gameplay',d)}
    <div class="live-match-grid">
      <div class="card live-events-panel"><h3>Eventos Série ${d}</h3><div id="log${d}" class="log">${events.length?events.map(e=>`<div class="event ${e.type}"><b>${e.min}'</b> ${e.text}</div>`).join(''):`<span class="muted">${hasLive?'A bola está rolando...':'Os eventos ficam disponíveis durante a partida.'}</span>`}</div></div>
      <div class="card live-scores-panel"><h2>Central Série ${d}</h2><div id="scores${d}" class="scores">${gameScoreRows(games,hasLive)}</div></div>
    </div>
    `;
  if(hasLive)drawLive();
}
setSeriesView=function(kind,d){
  if(kind==='table')return table(d);
  if(kind==='fixtures')return fixtures(d);
  if(kind==='gameplay'){gameplayDivision=d;return gameplay(d)}
};
